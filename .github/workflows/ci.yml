name: CI - Build and Push

on:
  workflow_dispatch :
    branches: [main]
    paths:
      - 'gateway/**'
      - 'bot/**'
      - '.github/workflows/ci.yml'

env:
  REGISRTY: ghcr.io
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/llm-telegram-bot-gateway
  BOT_IMAGE: ghcr.io/${{ github.repository_owner }}/llm-telegram-bot-bot 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/llm-telegram-bot-gateway:latest
            ghcr.io/${{ env.OWNER }}/llm-telegram-bot-gateway:${{ github.sha }}

      - name: Build and push bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/llm-telegram-bot-bot:latest
            ghcr.io/${{ env.OWNER }}/llm-telegram-bot-bot:${{ github.sha }}

      - name: Update image tags in helm/values.yaml
        run: |
          sed -i "s|tag: \"latest\".*# CI_GATEWAY_TAG|tag: \"${{ github.sha }}\"  # CI_GATEWAY_TAG|" helm/values.yaml
          sed -i "s|tag: \"latest\".*# CI_BOT_TAG|tag: \"${{ github.sha }}\"  # CI_BOT_TAG|" helm/values.yaml

      - name: Commit updated values.yaml
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add helm/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push