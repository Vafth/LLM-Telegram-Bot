name: Gateway CI

on:
  push :
    branches: [dev]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway.yml'
  pull_request:
    branches: [dev]
    paths:
      - 'gateway/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --package gateway --package LLM-Telegram-Bot --group dev

      - name: Create test env file
        run: cp .env.test.example .env.test

      - name: Run tests
        run: uv run pytest gateway/tests -v