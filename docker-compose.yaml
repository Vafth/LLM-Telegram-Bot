services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      
  model-puller:
    image: ollama/ollama
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:1.5b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

  gateway:
    build: ./gateway
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    ports:
      - "8000:8000"

  bot:
    build: ./bot
    depends_on:
      - gateway
    environment:
      - GATEWAY_URL=${GATEWAY_URL}
      - TOKEN=${TOKEN}

volumes:
  ollama_data: